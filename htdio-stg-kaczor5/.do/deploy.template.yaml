spec:
  name: deploystack
  region: nyc
  services:
    - name: db
      image:
        registry_type: DOCKER_HUB
        registry: library
        repository: mariadb
        tag: "11.2"
      instance_count: 1
      instance_size_slug: basic-xxs
      run_command: ""
      envs:
        - key: MYSQL_ROOT_PASSWORD
          value: ${DB_PASSWORD}
        - key: MYSQL_USER
          value: ${DB_USERNAME}
        - key: MYSQL_PASSWORD
          value: ${DB_PASSWORD}
        - key: MYSQL_DATABASE
          value: ${DB_DATABASE}
      health_check:
        port: 3306
      internal_ports:
        - 3306
    - name: app
      image:
        registry_type: DOCKER_HUB
        registry: linkace
        repository: linkace
        tag: simple
      instance_count: 1
      instance_size_slug: basic-xxs
      run_command: ""
      envs: []
      http_port: 80
      routes:
        - path: /
