services:
  - name: db
    type: pserv
    env: docker
    runtime: image
    image:
      url: docker.io/library/mariadb:11.2
    startCommand: ""
    plan: starter
    region: oregon
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: ChangeThisToASecurePassword!
      - key: MYSQL_USER
        value: linkace
      - key: MYSQL_PASSWORD
        value: ChangeThisToASecurePassword!
      - key: MYSQL_DATABASE
        value: linkace
    disk:
      name: db-var-lib-mysql
      mountPath: /var/lib/mysql
      sizeGB: 10
  - name: app
    type: web
    env: docker
    runtime: image
    image:
      url: docker.io/linkace/linkace:latest
    envVars:
      - key: PORT
        value: "8080"
      - key: HOME
        value: "/home/www-data"
      - key: XDG_CONFIG_HOME
        value: "/home/www-data/.config"
      - key: XDG_DATA_HOME
        value: "/home/www-data/.local/share"
    startCommand: |
      chmod +x /usr/bin/caddy && \
      mkdir -p /home/www-data/.config/caddy /home/www-data/.local/share/caddy && \
      chown -R www-data:www-data /home/www-data /usr/bin/caddy && \
      supervisord
    plan: starter
    region: oregon
    disk:
      name: app-app-storage-app-backups
      mountPath: /app/storage/app/backups
      sizeGB: 10
