services:
  - name: default
    type: web
    runtime: image
    image:
      url: docker.io/library/nginx:latest
    startCommand: ""
    plan: starter
    region: oregon
    envVars:
      - key: pipi
        value: nie wiem
      - key: PORT
        value: "5244"
    disk:
      name: default-opt-alist-data
      mountPath: /opt/alist/data
      sizeGB: 10
