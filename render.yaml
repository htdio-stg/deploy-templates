services:
  - name: db
    type: pserv
    env: docker
    runtime: image
    image:
      url: docker.io/library/mariadb:11.2
    startCommand: ""
    plan: starter
    region: oregon
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: ChangeThisToASecurePassword!
      - key: MYSQL_USER
        value: linkace
      - key: MYSQL_PASSWORD
        value: ChangeThisToASecurePassword!
      - key: MYSQL_DATABASE
        value: linkace
    disk:
      name: db-var-lib-mysql
      mountPath: /var/lib/mysql
      sizeGB: 10
  - name: app
    type: web
    env: docker
    runtime: image
    image:
      url: docker.io/linkace/linkace:latest
    envVars:
      - key: PORT
        value: "80"
    startCommand: |
      chown root:root /usr/bin/caddy && \
      chmod 755 /usr/bin/caddy && \
      setcap 'cap_net_bind_service=+ep' /usr/bin/caddy && \
      /usr/bin/supervisord -c /etc/supervisor.d/supervisord.ini
    plan: starter
    region: oregon
    disk:
      name: app-app-storage-app-backups
      mountPath: /app/storage/app/backups
      sizeGB: 10
