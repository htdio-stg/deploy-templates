spec:
  name: deploystack
  region: nyc
  services:
    - name: nginx
      image:
        registry_type: DOCKER_HUB
        registry: library
        repository: nginx
        tag: 1-alpine-another
      instance_count: 1
      instance_size_slug: basic-xxs
      run_command: ""
      envs:
        - key: PROTOCOL
          value: some-nice-value-or-not
      http_port: 80
      routes:
        - path: /
