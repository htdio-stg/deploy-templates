spec:
  name: deploystack
  region: nyc
  services:
    - name: nginx
      image:
        registry_type: DOCKER_HUB
        registry: library
        repository: nginx
        tag: main2
      instance_count: 1
      instance_size_slug: basic-xxs
      run_command: ""
      envs:
        - key: STORAGE_TYPE
          value: hetzner5
      http_port: 80
      routes:
        - path: /
