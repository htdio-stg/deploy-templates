services:
  - name: nginx
    type: web
    env: docker
    runtime: image
    image:
      url: docker.io/library/nginx:1-alpine
    startCommand: ""
    plan: starter
    region: oregon
    envVars:
      - key: PROTOCOL
        value: oni3
      - key: PORT
        value: "80"
    disk:
      name: nginx-usr-share-nginx-html
      mountPath: /usr/share/nginx/html
      sizeGB: 10
