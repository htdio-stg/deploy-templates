services:
  - name: default
    type: web
    env: docker
    runtime: image
    image:
      url: ghcr.io/dagu-org/dagu:latest
    startCommand: ""
    plan: starter
    region: oregon
    envVars:
      - key: PORT
        value: "8080"
    disk:
      name: default-home-dagu--config-dagu
      mountPath: /home/dagu/.config/dagu
      sizeGB: 10
