services:
  - name: nginx
    type: web
    env: docker
    runtime: image
    image:
      url: docker.io/library/nginx:main2
    startCommand: ""
    plan: starter
    region: oregon
    envVars:
      - key: STORAGE_TYPE
        value: hetzner5
      - key: PORT
        value: "80"
    disk:
      name: nginx-usr-share-nginx-html
      mountPath: /usr/share/nginx/html
      sizeGB: 10
