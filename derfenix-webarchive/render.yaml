services:
  - name: webarchive
    type: web
    env: docker
    runtime: image
    image:
      url: docker.io/library/ghcr.io/derfenix/webarchive:latest
    startCommand: ""
    plan: free
    region: oregon
    envVars:
      - key: LOGGING_DEBUG
        value: "true"
      - key: API_ADDRESS
        value: 0.0.0.0:5001
      - key: PDF_DPI
        value: "300"
      - key: DB_PATH
        value: /db
      - key: PORT
        value: null
