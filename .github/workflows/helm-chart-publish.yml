name: Helm Chart Publish

on:
  push:
    branches:
      - main
    paths:
      - '**/helm/**'

permissions:
  contents: write

jobs:
  package-and-publish:
    runs-on: ubuntu-latest
    # Add concurrency to prevent multiple workflows running simultaneously on the same branch
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true  # Changed to true to prevent conflicts
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check for deleted Helm directories
        id: check-deleted
        run: |
          # Get list of all deleted files in this push
          DELETED_FILES=$(git diff --name-status HEAD^ HEAD | grep '^D' | awk '{print $2}' || echo "")
          
          # Check if any of the deleted files are in a Helm directory
          if echo "$DELETED_FILES" | grep -q "/helm/"; then
            echo "This commit contains Helm deletions, skipping publish workflow"
            echo "SKIP_WORKFLOW=true" >> $GITHUB_ENV
          else
            echo "No Helm deletions detected, proceeding with publish workflow"
            echo "SKIP_WORKFLOW=false" >> $GITHUB_ENV
          fi

      - name: Set up Helm
        if: env.SKIP_WORKFLOW != 'true'
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Find and package changed Helm charts
        if: env.SKIP_WORKFLOW != 'true'
        run: |
          # Find changed files in this commit
          CHANGED_FILES=$(git diff --name-only HEAD^ HEAD | grep "helm/" || echo "")
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No Helm chart files changed in this commit"
            echo "HELM_EXISTS=false" >> $GITHUB_ENV
            exit 0
          fi
          
          # Extract unique chart directories from changed files
          echo "Changed Helm files:"
          echo "$CHANGED_FILES"
          
          # Create an array to store unique chart directories
          declare -A CHART_DIRS
          
          for FILE in $CHANGED_FILES; do
            # Extract the app directory (assuming structure like app-name/helm/...)
            APP_NAME=$(echo $FILE | cut -d'/' -f1)
            HELM_DIR="${APP_NAME}/helm"
            
            # Check if this is a valid helm chart directory
            if [ -f "${HELM_DIR}/Chart.yaml" ]; then
              CHART_DIRS["$HELM_DIR"]=1
            fi
          done
          
          # Check if we found any valid chart directories
          if [ ${#CHART_DIRS[@]} -eq 0 ]; then
            echo "No valid Helm chart directories found"
            echo "HELM_EXISTS=false" >> $GITHUB_ENV
            exit 0
          fi
          
          echo "Found changed Helm charts in directories:"
          for dir in "${!CHART_DIRS[@]}"; do
            echo "  - $dir"
          done
          
          # Create directory for packaged charts
          mkdir -p .charts
          
          # Package each chart
          for CHART_DIR in "${!CHART_DIRS[@]}"; do
            echo "Processing chart in $CHART_DIR"
            CHART_NAME=$(grep "name:" $CHART_DIR/Chart.yaml | awk '{print $2}')
            CHART_VERSION=$(grep "version:" $CHART_DIR/Chart.yaml | awk '{print $2}')
            
            # Package chart
            helm package $CHART_DIR -d .charts/
            
            echo "Packaged $CHART_NAME-$CHART_VERSION.tgz"
          done
          
          # Check if any charts were packaged
          if [ -z "$(ls -A .charts/ 2>/dev/null)" ]; then
            echo "No charts were packaged"
            echo "HELM_EXISTS=false" >> $GITHUB_ENV
          else
            echo "Successfully packaged charts:"
            ls -la .charts/
            echo "HELM_EXISTS=true" >> $GITHUB_ENV
          fi

      - name: Checkout gh-pages branch
        if: env.SKIP_WORKFLOW != 'true' && env.HELM_EXISTS == 'true'
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.APP_INSTALLATION_TOKEN }}
          fetch-depth: 0

      - name: Update Helm repository
        if: env.SKIP_WORKFLOW != 'true' && env.HELM_EXISTS == 'true'
        run: |
          # First, copy packaged charts to gh-pages directory
          cp .charts/*.tgz gh-pages/ || { echo "No charts to copy"; exit 0; }
          
          # Go to gh-pages directory
          cd gh-pages
          
          # Update the index.yaml file, merging with existing entries
          if [ -f "index.yaml" ] && [ -s "index.yaml" ]; then
            echo "Updating existing index.yaml"
            helm repo index . --url https://htdio-stg.github.io/deploy-templates --merge index.yaml
          else
            echo "Creating new index.yaml"
            helm repo index . --url https://htdio-stg.github.io/deploy-templates
          fi
          
          # Add metadata annotation
          echo "" >> index.yaml
          echo "# Charts updated from main branch on $(date)" >> index.yaml

      - name: Commit and push to gh-pages
        if: env.SKIP_WORKFLOW != 'true' && env.HELM_EXISTS == 'true'
        run: |
          cd gh-pages
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Add all new/changed chart files and the index.yaml
          git add index.yaml
          for file in ../.charts/*.tgz; do
            basename=$(basename "$file")
            git add "$basename"
          done
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Helm charts from main branch"
            
            # Pull before pushing to avoid conflicts
            git pull --rebase origin gh-pages
            
            # Push changes
            git push origin gh-pages
          fi
