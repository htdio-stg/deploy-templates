name: Helm Chart Publish

on:
  push:
    branches:
      - main
    paths:
      - '**/helm/**'

permissions:
  contents: write

jobs:
  package-and-publish:
    runs-on: ubuntu-latest
    # Add concurrency to prevent multiple workflows running simultaneously on the same branch
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check for deleted Helm directories
        id: check-deleted
        run: |
          # Get list of all deleted files in this push
          DELETED_FILES=$(git diff --name-status HEAD^ HEAD | grep '^D' | awk '{print $2}' || echo "")
          
          # Check if any of the deleted files are in a Helm directory
          if echo "$DELETED_FILES" | grep -q "/helm/"; then
            echo "This commit contains Helm deletions, skipping publish workflow"
            echo "SKIP_WORKFLOW=true" >> $GITHUB_ENV
          else
            echo "No Helm deletions detected, proceeding with publish workflow"
            echo "SKIP_WORKFLOW=false" >> $GITHUB_ENV
          fi

      - name: Set up Helm
        if: env.SKIP_WORKFLOW != 'true'
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Find and package Helm charts
        if: env.SKIP_WORKFLOW != 'true'
        run: |
          # Find all Chart.yaml files
          CHART_DIRS=$(find . -type f -name "Chart.yaml" | xargs dirname)
          
          if [ -z "$CHART_DIRS" ]; then
            echo "No Helm charts found"
            echo "HELM_EXISTS=false" >> $GITHUB_ENV
          else
            echo "Found Helm charts in: $CHART_DIRS"
            echo "HELM_EXISTS=true" >> $GITHUB_ENV
            
            # Create directory for packaged charts
            mkdir -p .charts
            
            # Package each chart
            for CHART_DIR in $CHART_DIRS; do
              echo "Processing chart in $CHART_DIR"
              CHART_NAME=$(grep "name:" $CHART_DIR/Chart.yaml | awk '{print $2}')
              CHART_VERSION=$(grep "version:" $CHART_DIR/Chart.yaml | awk '{print $2}')
              
              # Add app name to chart name for uniqueness
              APP_NAME=$(echo $CHART_DIR | cut -d'/' -f2)
              
              # Package chart
              helm package $CHART_DIR -d .charts/
              
              echo "Packaged $CHART_NAME-$CHART_VERSION.tgz from $APP_NAME"
            done
            
            # Check if any charts were packaged
            if [ -z "$(ls -A .charts/)" ]; then
              echo "No charts were packaged"
              echo "HELM_EXISTS=false" >> $GITHUB_ENV
            fi
          fi

      - name: Checkout gh-pages branch
        if: env.SKIP_WORKFLOW != 'true' && env.HELM_EXISTS == 'true'
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.APP_INSTALLATION_TOKEN }}
          # Add fetch-depth: 0 to get full history
          fetch-depth: 0

      - name: Update Helm repository
        if: env.SKIP_WORKFLOW != 'true' && env.HELM_EXISTS == 'true'
        run: |
          # Check if there are any packaged charts
          if [ ! -d ".charts" ] || [ -z "$(ls -A .charts/)" ]; then
            echo "No charts to publish"
            exit 0
          fi
          
          # Move packaged charts to gh-pages directory
          cp .charts/*.tgz gh-pages/ || { echo "No charts to copy"; exit 0; }
          
          # Go to gh-pages directory
          cd gh-pages
          
          # Check if index.yaml exists and has content
          if [ -f "index.yaml" ] && [ -s "index.yaml" ]; then
            echo "Updating existing index.yaml"
            helm repo index . --url https://htdio-stg.github.io/deploy-templates --merge index.yaml
          else
            echo "Creating new index.yaml"
            # Remove empty index.yaml if it exists
            rm -f index.yaml
            helm repo index . --url https://htdio-stg.github.io/deploy-templates
          fi
          
          # Add metadata annotation
          echo "" >> index.yaml
          echo "# Charts updated from main branch on $(date)" >> index.yaml

      - name: Commit and push to gh-pages
        if: env.SKIP_WORKFLOW != 'true' && env.HELM_EXISTS == 'true'
        run: |
          # Check if charts directory exists and has content
          if [ ! -d ".charts" ] || [ -z "$(ls -A .charts/)" ]; then
            echo "No charts to publish"
            exit 0
          fi
          
          cd gh-pages
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Pull latest changes from remote first to avoid conflicts
          git fetch origin gh-pages
          git reset --hard origin/gh-pages
          
          # Copy the charts back (they might have been lost in the reset)
          if [ -f "../.charts/"*.tgz ]; then
            cp ../.charts/*.tgz . || echo "No charts to copy"
          else
            echo "No charts found to copy"
            exit 0
          fi
          
          # Re-run indexing
          if [ -f "index.yaml" ] && [ -s "index.yaml" ]; then
            helm repo index . --url https://htdio-stg.github.io/deploy-templates --merge index.yaml
          else
            helm repo index . --url https://htdio-stg.github.io/deploy-templates
          fi
          
          # Add metadata annotation again
          echo "" >> index.yaml
          echo "# Charts updated from main branch on $(date)" >> index.yaml
          
          # Now add files
          git add index.yaml
          if ls *.tgz &> /dev/null; then
            git add *.tgz
          fi
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Helm charts from main branch"
            
            # Add retry logic for pushing with force if needed
            MAX_RETRIES=5
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              # Try to push normally first
              if git push; then
                echo "Successfully pushed changes"
                break
              elif [ $RETRY_COUNT -lt 3 ]; then
                # First few attempts: try with pull and merge
                RETRY_COUNT=$((RETRY_COUNT+1))
                echo "Push failed, retrying with merge... (Attempt $RETRY_COUNT of $MAX_RETRIES)"
                git pull origin gh-pages --no-rebase || true
                
                # Try pushing again
                if git push; then
                  echo "Successfully pushed changes after merging"
                  break
                fi
                
                sleep 5
              else
                # Last attempts: try with force-push if all else fails
                RETRY_COUNT=$((RETRY_COUNT+1))
                echo "Push with merge failed, retrying with force-push as last resort... (Attempt $RETRY_COUNT of $MAX_RETRIES)"
                
                if git push --force; then
                  echo "Successfully force-pushed changes"
                  break
                fi
                
                if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
                  echo "Failed to push after $MAX_RETRIES attempts"
                  exit 1
                fi
                
                sleep 5
              fi
            done
          fi
