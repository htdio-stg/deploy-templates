name: Helm Chart Publish

on:
  push:
    paths:
      - 'helm/**'
      - '**/helm/**'
    branches-ignore:
      - 'main'
      - 'skeleton'
      - 'gh-pages'

permissions:
  contents: write

jobs:
  package-and-publish:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, 'main') && !contains(github.ref, 'skeleton') && !contains(github.ref, 'gh-pages') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract branch name
        shell: bash
        run: echo "BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_ENV

      - name: Debug environment
        run: |
          echo "Current branch: ${{ env.BRANCH_NAME }}"
          echo "GitHub ref: ${{ github.ref }}"
          echo "Files changed:"
          git diff --name-only HEAD~1 HEAD || echo "Cannot show diff"
          echo "Repository structure:"
          find . -type f -name "Chart.yaml" | xargs dirname || echo "No Chart.yaml found"

      - name: Find Helm charts
        id: find_charts
        run: |
          CHART_DIRS=$(find . -type f -name "Chart.yaml" | xargs dirname)
          if [ -z "$CHART_DIRS" ]; then
            echo "No Helm charts found"
            echo "HELM_EXISTS=false" >> $GITHUB_ENV
          else
            echo "Found Helm charts in: $CHART_DIRS"
            echo "HELM_EXISTS=true" >> $GITHUB_ENV
            echo "CHART_DIRS<<EOF" >> $GITHUB_ENV
            echo "$CHART_DIRS" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Set up Helm
        if: env.HELM_EXISTS == 'true'
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Package Helm charts
        if: env.HELM_EXISTS == 'true'
        run: |
          mkdir -p .charts
          for CHART_DIR in ${{ env.CHART_DIRS }}; do
            echo "Processing chart in $CHART_DIR"
            CHART_NAME=$(grep "name:" $CHART_DIR/Chart.yaml | awk '{print $2}')
            CHART_VERSION=$(grep "version:" $CHART_DIR/Chart.yaml | awk '{print $2}')
            
            helm package $CHART_DIR -d .charts/
            
            CHART_FILENAMES="$CHART_FILENAMES $CHART_NAME-$CHART_VERSION.tgz"
          done
          
          echo "CHART_FILENAMES=${CHART_FILENAMES}" >> $GITHUB_ENV

      - name: Checkout gh-pages branch
        if: env.HELM_EXISTS == 'true'
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.APP_INSTALLATION_TOKEN }}

      - name: Update Helm repository
        if: env.HELM_EXISTS == 'true'
        run: |
          # Move packaged charts to gh-pages directory
          cp .charts/*.tgz gh-pages/
          
          # Go to gh-pages directory
          cd gh-pages
          
          # Generate or update index.yaml
          if [ -f "index.yaml" ]; then
            helm repo index . --url https://htdio-stg.github.io/deploy-templates --merge index.yaml
          else
            helm repo index . --url https://htdio-stg.github.io/deploy-templates
          fi
          
          # Add metadata annotation about source branch
          echo "" >> index.yaml
          echo "# Charts updated from branch: ${{ env.BRANCH_NAME }} on $(date)" >> index.yaml

      - name: Commit and push to gh-pages
        if: env.HELM_EXISTS == 'true'
        run: |
          cd gh-pages
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add index.yaml *.tgz
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add Helm charts from branch ${{ env.BRANCH_NAME }}"
            git push
          fi
