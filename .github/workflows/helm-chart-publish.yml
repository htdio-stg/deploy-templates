name: Helm Chart Publish

on:
  push:
    branches-ignore:
      - 'main'
      - 'skeleton'
      - 'gh-pages'
    paths:
      - 'helm/**'

jobs:
  package-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Extract branch name
        shell: bash
        run: echo "BRANCH_NAME=$(echo ${GITHUB_REF#refs/heads/})" >> $GITHUB_ENV

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Check if Helm chart exists
        id: check_helm
        run: |
          if [ -d "helm" ] && [ -f "helm/Chart.yaml" ]; then
            echo "HELM_EXISTS=true" >> $GITHUB_ENV
          else
            echo "HELM_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Package Helm chart
        if: env.HELM_EXISTS == 'true'
        run: |
          # Extract chart info
          CHART_NAME=$(grep "name:" helm/Chart.yaml | awk '{print $2}')
          CHART_VERSION=$(grep "version:" helm/Chart.yaml | awk '{print $2}')
          
          # Create directory for packaged chart
          mkdir -p .charts
          
          # Package chart
          helm package helm/ -d .charts/
          
          # Store the tgz filename
          echo "CHART_FILENAME=${CHART_NAME}-${CHART_VERSION}.tgz" >> $GITHUB_ENV
          echo "CHART_NAME=${CHART_NAME}" >> $GITHUB_ENV
          echo "CHART_VERSION=${CHART_VERSION}" >> $GITHUB_ENV

      - name: Checkout gh-pages branch
        if: env.HELM_EXISTS == 'true'
        uses: actions/checkout@v3
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.APP_INSTALLATION_TOKEN }}

      - name: Update Helm repository
        if: env.HELM_EXISTS == 'true'
        run: |
          # Move packaged chart to gh-pages directory
          cp .charts/${{ env.CHART_FILENAME }} gh-pages/
          
          # Go to gh-pages directory
          cd gh-pages
          
          # Generate or update index.yaml
          if [ -f "index.yaml" ]; then
            helm repo index . --url https://htdio-stg.github.io/deploy-templates --merge index.yaml
          else
            helm repo index . --url https://htdio-stg.github.io/deploy-templates
          fi
          
          # Add metadata annotation about source branch
          echo "" >> index.yaml
          echo "# Chart ${{ env.CHART_NAME }}-${{ env.CHART_VERSION }} from branch: ${{ env.BRANCH_NAME }}" >> index.yaml

      - name: Commit and push to gh-pages
        if: env.HELM_EXISTS == 'true'
        run: |
          cd gh-pages
          
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add index.yaml ${{ env.CHART_FILENAME }}
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add Helm chart ${{ env.CHART_NAME }}-${{ env.CHART_VERSION }} from branch ${{ env.BRANCH_NAME }}"
            git push
          fi
