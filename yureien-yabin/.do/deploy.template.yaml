spec:
  name: deploystack
  region: nyc
  services:
    - name: yabin
      image:
        registry_type: DOCKER_HUB
        registry: yureien
        repository: yabin
        tag: latest
      instance_count: 1
      instance_size_slug: basic-xxs
      run_command: ""
      envs: []
      http_port: 3000
      routes:
        - path: /
    - name: db
      image:
        registry_type: DOCKER_HUB
        registry: library
        repository: postgres
        tag: 15-alpine
      instance_count: 1
      instance_size_slug: basic-xxs
      run_command: ""
      envs:
        - key: POSTGRES_USER
          value: yabin_user
        - key: POSTGRES_PASSWORD
          value: "123"
        - key: POSTGRES_DB
          value: yabin_db
        - key: POSTGRES_HOST_AUTH_METHOD
          value: trust
      health_check:
        port: 5432
      internal_ports:
        - 5432
