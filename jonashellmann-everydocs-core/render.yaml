services:
  - name: everydocs_core
    type: web
    env: docker
    runtime: image
    image:
      url: docker.io/jonashellmann/everydocs:latest
    startCommand: ""
    plan: starter
    region: oregon
    envVars:
      - key: SECRET_KEY_BASE
        value: ${SECRET_KEY_BASE}
      - key: EVERYDOCS_DB_ADAPTER
        value: mysql2
      - key: EVERYDOCS_DB_NAME
        value: everydocs
      - key: EVERYDOCS_DB_USER
        value: everydocs
      - key: EVERYDOCS_DB_PASSWORD
        value: PASSWORD123!
      - key: EVERYDOCS_DB_HOST
        value: everydocs_db
      - key: EVERYDOCS_DB_PORT
        value: "3306"
      - key: PORT
        value: "5678"
    disk:
      name: everydocs_core-var-everydocs-files
      mountPath: /var/everydocs-files
      sizeGB: 10
  - name: everydocs_web
    type: web
    env: docker
    runtime: image
    image:
      url: docker.io/jonashellmann/everydocs-web:latest
    startCommand: ""
    plan: starter
    region: oregon
    envVars:
      - key: PORT
        value: "80"
    disk:
      name: everydocs_web-usr-local-apache2-htdocs-config-js
      mountPath: /usr/local/apache2/htdocs/config.js
      sizeGB: 10
  - name: everydocs_db
    type: pserv
    env: docker
    runtime: image
    image:
      url: docker.io/library/mariadb:10.7.3
    startCommand: ""
    plan: starter
    region: oregon
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: password
      - key: MYSQL_DATABASE
        value: everydocs
      - key: MYSQL_USER
        value: everydocs
      - key: MYSQL_PASSWORD
        value: PASSWORD123!
    disk:
      name: everydocs_db-var-lib-mysql
      mountPath: /var/lib/mysql
      sizeGB: 10
